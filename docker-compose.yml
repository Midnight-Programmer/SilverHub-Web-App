services:
  postgres:
    image: postgres:18
    container_name: silverhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: silverhub
      POSTGRES_PASSWORD: silverhub_dev_pw
      POSTGRES_DB: silverhub_dev
    ports:
      - "5433:5432"
    volumes:
      - silverhub_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U silverhub -d silverhub_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  silverhub_pgdata:
